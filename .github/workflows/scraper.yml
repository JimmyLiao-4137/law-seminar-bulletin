name: 法學研討會爬蟲

on:
  # 手動觸發（手機上按一鍵執行）
  workflow_dispatch:

  # 定時排程：每 3 天凌晨 2 點（台灣時間）自動執行
  schedule:
    - cron: '0 18 */3 * *'  # UTC 18:00 = 台灣時間 02:00

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r scraper/requirements.txt

      - name: 執行爬蟲
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python scraper/scraper.py --force

      - name: 提交並推送結果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seminars.json
          if [ -d "data/posters" ] && [ "$(ls -A data/posters 2>/dev/null)" ]; then
            git add --force data/posters/*
          fi
          if git diff --staged --quiet; then
            echo "沒有新資料，跳過提交"
          else
            git commit -m "自動更新研討會資料 $(date +'%Y-%m-%d')"
            git push
          fi
