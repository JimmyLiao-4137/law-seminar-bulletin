<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法學研討會布告欄</title>
  <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #1a3a5c; --primary-light: #2a5a8c; --accent: #c8a45c;
  --bg: #f5f3ef; --bg-card: #ffffff; --text: #2c2c2c; --text-light: #6b6b6b;
  --border: #e0ddd8; --gov-color: #8b1a1a; --uni-color: #1a4a8b;
  --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 10px;
}
body { font-family: "Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: #fff; padding: 2.5rem 1.5rem 2rem; text-align: center; }
.header h1 { font-size: 2rem; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
.subtitle { font-size: 0.95rem; opacity: 0.85; }
.last-updated { font-size: 0.8rem; opacity: 0.6; margin-top: 0.5rem; }
.main-container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
.filter-bar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 1.2rem 0; flex-wrap: wrap; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border); }
.category-tabs { display: flex; gap: 0.4rem; }
.tab { padding: 0.5rem 1.2rem; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-light); border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
.tab:hover { border-color: var(--primary); color: var(--primary); }
.tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.search-box input { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 20px; font-size: 0.9rem; width: 260px; outline: none; }
.search-box input:focus { border-color: var(--primary); }
.content-layout { display: flex; gap: 2rem; padding: 1.5rem 0 3rem; }
.sidebar { width: 220px; flex-shrink: 0; }
.sidebar h3 { font-size: 0.95rem; color: var(--primary); margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--accent); }
.source-group-label { font-size: 0.8rem; font-weight: 600; color: var(--text-light); margin-top: 0.8rem; margin-bottom: 0.3rem; }
.source-filters label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; padding: 0.25rem 0; cursor: pointer; }
.source-filters label:hover { color: var(--primary); }
.source-filters input[type="checkbox"] { accent-color: var(--primary); }
.timeline-container { flex: 1; min-width: 0; }
.timeline { position: relative; padding-left: 2.5rem; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 2px; }
.date-group { margin-bottom: 2rem; }
.date-marker { position: relative; margin-bottom: 1rem; }
.date-marker::before { content: ''; position: absolute; left: -2.5rem; top: 50%; transform: translateY(-50%); width: 19px; height: 19px; background: var(--accent); border: 3px solid var(--bg); border-radius: 50%; box-shadow: 0 0 0 2px var(--accent); z-index: 2; }
.date-label { font-size: 1rem; font-weight: 700; color: var(--primary); }
.date-weekday { font-size: 0.8rem; color: var(--text-light); margin-left: 0.5rem; }
.seminar-card { position: relative; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 1rem; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border-left: 4px solid transparent; }
.seminar-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.seminar-card.government { border-left-color: var(--gov-color); }
.seminar-card.university { border-left-color: var(--uni-color); }
.seminar-card::before { content: ''; position: absolute; left: -1.85rem; top: 1.2rem; width: 11px; height: 11px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 50%; z-index: 2; }
.card-poster { width: 100%; max-height: 300px; object-fit: cover; display: block; }
.card-content { display: flex; gap: 1rem; padding: 1.2rem; }
.card-logo { width: 60px; height: 60px; object-fit: contain; flex-shrink: 0; background: var(--bg); border-radius: 8px; padding: 6px; }
.card-info { flex: 1; min-width: 0; }
.card-has-poster .card-content { padding: 1rem 1.2rem; }
.card-has-poster .card-logo { width: 40px; height: 40px; }
.card-source { font-size: 0.78rem; font-weight: 600; color: var(--text-light); margin-bottom: 0.2rem; }
.card-source.government { color: var(--gov-color); }
.card-source.university { color: var(--uni-color); }
.card-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; line-height: 1.4; }
.card-meta { display: flex; flex-wrap: wrap; gap: 0.6rem; font-size: 0.8rem; color: var(--text-light); }
.card-meta span::before { margin-right: 0.2rem; }
.meta-time::before { content: "\1F552"; }
.meta-location::before { content: "\1F4CD"; }
.card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
.tag { font-size: 0.72rem; padding: 0.15rem 0.5rem; background: var(--bg); border-radius: 10px; color: var(--text-light); }
.card-link-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; font-size: 0.78rem; }
.card-link-row a { color: var(--primary); text-decoration: none; }
.card-link-row a:hover { text-decoration: underline; }
.field-masked { color: transparent; background: repeating-linear-gradient(90deg,#ddd 0,#ddd 8px,#eee 8px,#eee 16px); border-radius: 3px; user-select: none; display: inline-block; min-width: 60px; min-height: 1em; }
.no-results { text-align: center; padding: 3rem; color: var(--text-light); font-size: 1.1rem; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg-card); border-radius: var(--radius); max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.modal-close { position: absolute; top: 0.8rem; right: 1rem; font-size: 1.8rem; background: rgba(255,255,255,0.8); border: none; cursor: pointer; color: var(--text-light); z-index: 2; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
.modal-close:hover { color: var(--text); background: rgba(0,0,0,0.05); }
.modal-poster { width: 100%; max-height: 400px; object-fit: contain; background: #f0ede8; }
.modal-content { padding: 1.5rem; }
.modal-source { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
.modal-source.government { color: var(--gov-color); }
.modal-source.university { color: var(--uni-color); }
.modal-title { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 0.8rem; line-height: 1.4; }
.modal-details { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-light); }
.modal-description { font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.2rem; }
.modal-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.2rem; }
.modal-tags .tag { font-size: 0.8rem; padding: 0.2rem 0.6rem; }
.modal-link { display: inline-block; padding: 0.6rem 1.5rem; background: var(--primary); color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.9rem; transition: background 0.2s; }
.modal-link:hover { background: var(--primary-light); }
.footer { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: var(--text-light); border-top: 1px solid var(--border); }
.empty-notice { text-align: center; padding: 4rem 2rem; color: var(--text-light); }
.empty-notice h2 { font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--primary); }
@media (max-width: 768px) {
  .header h1 { font-size: 1.5rem; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .category-tabs { overflow-x: auto; white-space: nowrap; }
  .search-box input { width: 100%; }
  .content-layout { flex-direction: column; gap: 1rem; }
  .sidebar { width: 100%; }
  .source-filters { display: flex; flex-wrap: wrap; gap: 0 1rem; }
  .source-group-label { width: 100%; }
  .timeline { padding-left: 2rem; }
  .card-poster { max-height: 200px; }
  .modal { max-height: 95vh; border-radius: 8px; }
}
@media (max-width: 480px) {
  .header { padding: 1.5rem 1rem; } .header h1 { font-size: 1.3rem; }
  .tab { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
  .card-content { padding: 0.8rem; } .card-title { font-size: 0.95rem; }
}
  </style>
</head>
<body>
  <header class="header">
    <h1>法學研討會布告欄</h1>
    <p class="subtitle">蒐集司法機關及各大學法律系所研討會資訊</p>
    <p class="last-updated" id="lastUpdated"></p>
  </header>
  <div class="main-container">
    <div class="filter-bar">
      <div class="category-tabs">
        <button class="tab active" data-category="all">全部</button>
        <button class="tab" data-category="government">政府 / 司法機關</button>
        <button class="tab" data-category="university">大學法律系所</button>
      </div>
      <div class="search-box"><input type="text" id="searchInput" placeholder="搜尋研討會名稱、主題..."></div>
    </div>
    <div class="content-layout">
      <aside class="sidebar"><h3>來源單位</h3><div class="source-filters" id="sourceFilters"></div></aside>
      <main class="timeline-container">
        <div class="timeline" id="timeline"></div>
        <div class="no-results" id="noResults" style="display:none;"><p>找不到符合條件的研討會資訊</p></div>
        <div class="empty-notice" id="emptyNotice" style="display:none;"><h2>尚無已上架的研討會資訊</h2><p>管理者審核通過後將顯示於此。</p></div>
      </main>
    </div>
  </div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal"><button class="modal-close" id="modalClose">&times;</button><div class="modal-body" id="modalBody"></div></div>
  </div>
  <footer class="footer"><p>法學研討會布告欄 &copy; 2026 | 資料定期自動更新</p></footer>

  <script src="js/data.js"></script>
  <script>
(function () {
  'use strict';
  const STORAGE_KEY = 'law_seminar_statuses';
  let seminars = [], activeCategory = 'all', activeSources = new Set(), searchQuery = '';
  const $ = id => document.getElementById(id);
  const timeline = $('timeline'), noResults = $('noResults'), emptyNotice = $('emptyNotice');
  const sourceFilters = $('sourceFilters'), searchInput = $('searchInput');
  const modalOverlay = $('modalOverlay'), modalBody = $('modalBody');
  const weekdays = ['日','一','二','三','四','五','六'];

  function loadStatuses() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e) { return {}; } }
  function formatDate(ds) { const d = new Date(ds+'T00:00:00'); return { display:`${d.getMonth()+1} 月 ${d.getDate()} 日`, weekday:`星期${weekdays[d.getDay()]}` }; }
  function logoSvg(src, cat) {
    const bg = cat==='government'?'#8b1a1a':'#1a4a8b';
    return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><rect width="60" height="60" rx="8" fill="${bg}"/><text x="30" y="35" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff">${src.substring(0,2)}</text></svg>`)}`;
  }
  function posterSvg(s) {
    const bg = s.category==='government'?'#6b1010':'#0e3366', t = s.title.length>14?s.title.substring(0,14)+'...':s.title;
    return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300"><rect width="600" height="300" fill="${bg}"/><rect x="30" y="30" width="540" height="240" rx="8" fill="none" stroke="#c8a45c" stroke-width="2" opacity="0.5"/><text x="300" y="120" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#fff">${t}</text><text x="300" y="165" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#c8a45c">${s.source}</text><text x="300" y="200" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">${s.date}  ${s.time||''}</text><text x="300" y="230" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">${s.location||''}</text></svg>`)}`;
  }
  function tagsHtml(tags) { return (tags||[]).map(t=>`<span class="tag">${t}</span>`).join(''); }
  function groupByDate(items) { const g={}; items.forEach(s=>{(g[s.date]=g[s.date]||[]).push(s);}); return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0])); }

  // 前台只顯示 published
  function getFiltered() {
    return seminars.filter(s => {
      if (s.status !== 'published') return false;
      if (activeCategory !== 'all' && s.category !== activeCategory) return false;
      if (activeSources.size > 0 && !activeSources.has(s.source)) return false;
      if (searchQuery && !(s.title+s.source+s.description+(s.tags||[]).join(' ')).toLowerCase().includes(searchQuery.toLowerCase())) return false;
      return true;
    });
  }

  function render() {
    const filtered = getFiltered();
    timeline.innerHTML = '';
    const hasPublished = seminars.some(s => s.status === 'published');
    emptyNotice.style.display = !hasPublished ? 'block' : 'none';
    noResults.style.display = (hasPublished && !filtered.length) ? 'block' : 'none';
    if (!filtered.length) return;

    groupByDate(filtered).forEach(([date, items]) => {
      const d = formatDate(date);
      const group = document.createElement('div'); group.className = 'date-group';
      group.innerHTML = `<div class="date-marker"><span class="date-label">${d.display}</span><span class="date-weekday">${d.weekday}</span></div>`;
      items.forEach(s => {
        const card = document.createElement('div'); card.className = `seminar-card ${s.category}`;
        const logo = logoSvg(s.source, s.category), hasPoster = !!s.posterUrl;
        const timeH = s.time||'<span class="field-masked">時間待確認</span>';
        const locH = s.location||'<span class="field-masked">地點待確認</span>';
        const link = `<div class="card-link-row"><a href="${s.url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">&#x1F517; 原始公告</a></div>`;
        const body = `<div class="card-content"><img class="card-logo" src="${logo}" alt="${s.source}"><div class="card-info"><div class="card-source ${s.category}">${s.source}</div><div class="card-title">${s.title}</div><div class="card-meta"><span class="meta-time">${timeH}</span><span class="meta-location">${locH}</span></div><div class="card-tags">${tagsHtml(s.tags)}</div>${link}</div></div>`;
        if (hasPoster) { card.classList.add('card-has-poster'); card.innerHTML = `<img class="card-poster" src="${posterSvg(s)}" alt="${s.title}" loading="lazy">${body}`; }
        else { card.innerHTML = body; }
        card.addEventListener('click', () => openModal(s));
        group.appendChild(card);
      });
      timeline.appendChild(group);
    });
  }

  function openModal(s) {
    const hasPoster = !!s.posterUrl, d = formatDate(s.date);
    const timeH = s.time||'<span class="field-masked">時間待確認</span>';
    const locH = s.location||'<span class="field-masked">地點待確認</span>';
    const descH = s.description||'<span class="field-masked">說明待補充</span>';
    modalBody.innerHTML = `
      ${hasPoster?`<img class="modal-poster" src="${posterSvg(s)}" alt="${s.title}">`:''}
      <div class="modal-content">
        <div class="modal-source ${s.category}">${s.source}</div>
        <h2 class="modal-title">${s.title}</h2>
        <div class="modal-details"><span>\u{1F4C5} ${d.display} ${d.weekday}</span><span>\u{1F552} ${timeH}</span><span>\u{1F4CD} ${locH}</span></div>
        <p class="modal-description">${descH}</p>
        <div class="modal-tags">${tagsHtml(s.tags)}</div>
        <div style="display:flex;gap:0.8rem;flex-wrap:wrap;">
          <a class="modal-link" href="${s.url}" target="_blank" rel="noopener noreferrer">前往原始公告頁面</a>
          <a class="modal-link" href="${s.sourceUrl}" target="_blank" rel="noopener noreferrer" style="background:var(--text-light);">${s.source} 官網</a>
        </div>
      </div>`;
    modalOverlay.classList.add('open'); document.body.style.overflow = 'hidden';
  }
  function closeModal() { modalOverlay.classList.remove('open'); document.body.style.overflow = ''; }

  function buildSourceFilters() {
    const gov = [...new Set(seminars.filter(s=>s.status==='published'&&s.category==='government').map(s=>s.source))];
    const uni = [...new Set(seminars.filter(s=>s.status==='published'&&s.category==='university').map(s=>s.source))];
    let html = '';
    if (gov.length) { html += '<div class="source-group-label">政府 / 司法機關</div>'; gov.forEach(src => { html += `<label><input type="checkbox" value="${src}"> ${src}</label>`; }); }
    if (uni.length) { html += '<div class="source-group-label">大學法律系所</div>'; uni.forEach(src => { html += `<label><input type="checkbox" value="${src}"> ${src}</label>`; }); }
    sourceFilters.innerHTML = html;
    sourceFilters.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => { activeSources.clear(); sourceFilters.querySelectorAll('input:checked').forEach(c=>activeSources.add(c.value)); render(); });
    });
  }

  document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); activeCategory = tab.dataset.category; render(); }); });
  searchInput.addEventListener('input', e => { searchQuery = e.target.value.trim(); render(); });
  $('modalClose').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Init
  const saved = loadStatuses();
  seminars = (DATA.seminars||[]).map(s => {
    if (!s.sourceUrl) { try { s.sourceUrl = new URL(s.url).origin+'/'; } catch(e) { s.sourceUrl = s.url; } }
    s.status = saved[s.id] || s.status || 'pending';
    return s;
  });
  $('lastUpdated').textContent = `最後更新：${new Date(DATA.lastUpdated).toLocaleString('zh-TW')}`;
  buildSourceFilters();
  render();
})();
  </script>
</body>
</html>
